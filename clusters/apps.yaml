apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-layer
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infra-layer
  path: ./apps/opacs  # Targets the application overlay anchor folder
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
