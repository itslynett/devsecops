apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-layer
  namespace: flux-system
spec:
  interval: 10m
  # Pointing to your environment overlay directory for Hadoop
  path: ./apps/opacs/hdfs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-layer
  timeout: 5m
  targetNamespace: hadoop
