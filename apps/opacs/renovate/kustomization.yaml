apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

configMapGenerator:
  - name: renovate-config
    envs:
      - ../../base/renovate-common.env
      - renovate-prod.env
  - name: renovate-config-files
    files:
      - config.js=../../base/renovate-config.js

secretGenerator:
  - name: renovate-secret
    envs:
      - .env.secret
    type: Opaque
  - name: renovate-github-app-pem
    files:
      - github-app.pem=../../base/mistiusiu-mend-renovate.2026-07-09.private-key.pem
    type: Opaque
