apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical-secrets-operator
  namespace: infisical
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: secrets-operator
      version: ">=0.11.0"
      sourceRef:
        kind: HelmRepository
        name: infisical-helm-charts
      interval: 1h0m0s
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
