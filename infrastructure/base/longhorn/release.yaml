apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.7.2" # Pin to your preferred stable version (e.g., 1.7.x branch)
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
  upgrade:
    remediation:
      retries: 3
  install:
    createNamespace: false # Turned off because namespace.yaml handles this
  targetNamespace: longhorn-system
