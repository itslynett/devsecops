apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.12.0" # Pinned to the latest stable feature release
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
  upgrade:
    remediation:
      retries: 3
  install:
    createNamespace: false
  targetNamespace: longhorn-system
