apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system # Or your designated infra namespace
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.12.0" # Pin to your preferred stable version
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
  upgrade:
    remediation:
      retries: 3
  install:
    createNamespace: true
  targetNamespace: longhorn-system
